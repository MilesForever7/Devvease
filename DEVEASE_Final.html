<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400&family=Cinzel:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    :root {
      --bg: linear-gradient(180deg, #e6f0fa 0%, #f5e9dd 100%);
      --primary: #2d1e10;
      --secondary: #5a4032;
      --accent: #fdf6e3;
      --card-bg: #ffffff;
      --text-color: #2d1e10;
      --box-bg: #fffaf1;
      --shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      --error: #d32f2f;
      --success: #2e7d32;
      --ship-color: #333333;
      --title-glow: #4ecdc4;
    }

    body.dark-mode {
      --bg: linear-gradient(180deg, #1a252f 0%, #1f140b 100%);
      --primary: #fdf6e3;
      --secondary: #b89e8a;
      --accent: #2d1e10;
      --card-bg: #2a1c13;
      --text-color: #fdf6e3;
      --box-bg: #3b2a1e;
      --shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
      --error: #ef5350;
      --success: #4caf50;
      --ship-color: #b89e8a;
      --title-glow: #b89e8a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem;
      transition: background 0.3s ease, color 0.3s ease;
      color: var(--text-color);
      position: relative;
      overflow-x: hidden;
    }

    .ocean-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
    }

    .ship {
      position: absolute;
      font-size: 1rem;
      color: var(--ship-color);
      opacity: 0.3;
      transition: transform 0.3s ease;
      pointer-events: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 2;
    }

    .header h1 {
      font-size: 2.5rem;
      color: var(--primary);
      font-weight: 700;
      display: inline-block;
      text-shadow: 0 0 10px var(--title-glow);
    }

    .header h1:hover {
      animation: shake 0.2s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(2px, -2px) rotate(2deg); }
    }

    .mode-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .mode-toggle input {
      display: none;
    }

    .mode-toggle label {
      background-color: var(--secondary);
      width: 4rem;
      height: 2rem;
      border-radius: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      position: relative;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
    }

    .mode-toggle label:hover {
      box-shadow: 0 0 10px var(--title-glow);
    }

    .mode-toggle .sun,
    .mode-toggle .moon {
      font-size: 1.2rem;
      color: var(--accent);
      transition: transform 0.4s ease;
    }

    .mode-toggle input:checked + label .sun {
      transform: scale(0.8);
    }

    .mode-toggle input:not(:checked) + label .moon {
      transform: scale(0.8);
    }

    .mode-toggle input:checked + label .moon,
    .mode-toggle input:not(:checked) + label .sun {
      transform: scale(1.2);
    }

    .mode-toggle .ball {
      width: 1.5rem;
      height: 1.5rem;
      background-color: var(--accent);
      position: absolute;
      top: 0.25rem;
      left: 0.25rem;
      border-radius: 50%;
      transition: transform 0.4s ease-in-out, box-shadow 0.4s ease;
    }

    .mode-toggle input:checked + label .ball {
      transform: translateX(2rem);
      box-shadow: 0 0 8px var(--title-glow);
    }

    .mode-toggle .vibe {
      font-size: 0.9rem;
      color: var(--text-color);
      font-weight: 500;
      text-transform: capitalize;
    }

    .settings-toggle {
      position: fixed;
      top: 4.5rem;
      right: 1.5rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .settings-toggle button {
      width: 4rem;
      height: 2rem;
      background-color: #6b7280;
      border: none;
      border-radius: 8px;
      font-size: 1.2rem;
      color: var(--accent);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .settings-toggle button:hover {
      box-shadow: 0 0 10px var(--title-glow);
    }

    .settings-toggle button.spin {
      animation: tireSpin 0.5s linear;
    }

    @keyframes tireSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .smoke {
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(107, 114, 128, 0.5);
      border-radius: 50%;
      animation: smokeEffect 1s ease forwards;
    }

    @keyframes smokeEffect {
      0% { transform: translateY(0) scale(1); opacity: 0.5; }
      100% { transform: translateY(-30px) scale(1.5); opacity: 0; }
    }

    .settings-panel {
      display: none;
      position: fixed;
      top: 6.5rem;
      right: 1.5rem;
      background: var(--card-bg);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      width: 250px;
      z-index: 1000;
      color: var(--text-color);
    }

    .settings-panel.active {
      display: block;
    }

    .settings-panel label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .settings-panel select,
    .settings-panel input[type="text"],
    .settings-panel button {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--secondary);
      border-radius: 8px;
      background: var(--box-bg);
      color: var(--text-color);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .settings-panel select:focus,
    .settings-panel input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
    }

    .settings-panel .toggle-switch {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .settings-panel .toggle-switch input {
      display: none;
    }

    .settings-panel .toggle-switch label {
      width: 2.5rem;
      height: 1.5rem;
      background-color: var(--secondary);
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      padding: 0.2rem;
      cursor: pointer;
      position: relative;
    }

    .settings-panel .toggle-switch .ball {
      width: 1.1rem;
      height: 1.1rem;
      background-color: var(--accent);
      border-radius: 50%;
      transition: transform 0.3s ease;
    }

    .settings-panel .toggle-switch input:checked + label .ball {
      transform: translateX(1.2rem);
    }

    .settings-panel button {
      background-color: var(--secondary);
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .settings-panel button:hover {
      background-color: var(--primary);
    }

    .footer-links {
      position: absolute;
      top: 4rem;
      left: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 2;
    }

    .footer-links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: linear-gradient(45deg, var(--secondary), var(--primary));
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .footer-links a:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
      background: linear-gradient(45deg, var(--primary), var(--secondary));
    }

    .footer-links .ilogix-link .ship-logo {
      font-size: 1rem;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
      max-width: 1200px;
      margin: 4rem auto 0;
      position: relative;
      z-index: 2;
    }

    .validator-container {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      z-index: 2;
    }

    .autofill-box {
      background-color: var(--card-bg);
      border: 1px solid var(--secondary);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .validator-container .autofill-box {
      width: 100%;
      max-width: 800px;
      padding: 2rem;
    }

    .validator-container .autofill-box textarea {
      height: 200px;
    }

    .autofill-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 100%;
      background: linear-gradient(
        45deg,
        transparent,
        rgba(93, 65, 50, 0.15),
        transparent,
        rgba(93, 65, 50, 0.15),
        transparent
      );
      opacity: 0;
      z-index: -1;
      transition: opacity 0.3s ease;
      animation: shimmer 4s infinite linear;
    }

    .autofill-box:hover::before {
      opacity: 1;
    }

    .autofill-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
    }

    @keyframes shimmer {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(50%); }
    }

    .autofill-box label {
      font-weight: 600;
      color: var(--text-color);
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      display: block;
      position: relative;
      z-index: 2;
    }

    .autofill-box select,
    .autofill-box textarea,
    .autofill-box input,
    .autofill-box button {
      width: 100%;
      margin-top: 0.5rem;
      border-radius: 8px;
      font-family: inherit;
      position: relative;
      z-index: 2;
    }

    .autofill-box select {
      padding: 0.6rem;
      border: 1px solid var(--secondary);
      background-color: var(--box-bg);
      color: var(--text-color);
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }

    .autofill-box input {
  padding: 0.6rem;
  border: 1px solid var(--secondary);
  background-color: var(--box-bg);
  color: var(--text-color);
  font-size: 0.95rem;
  transition: border-color 0.2s ease;
}

.autofill-box input:focus {
  outline: none;
  border-color: var(--primary);
}

    .autofill-box select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .autofill-box textarea {
      height: 140px;
      padding: 0.75rem;
      border: 1px solid var(--secondary);
      background-color: var(--box-bg);
      color: var(--text-color);
      font-family: 'Fira Code', monospace;
      font-size: 0.9rem;
      resize: none;
      transition: border-color 0.2s ease;
    }

    .autofill-box textarea.path-box {
      height: 40px;
    }

    .autofill-box textarea.invalid {
      border-color: var(--error);
    }

    .autofill-box textarea.valid {
      border-color: var(--success);
    }

    .autofill-box textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .autofill-box button {
      padding: 0.75rem;
      font-weight: 600;
      border: none;
      background-color: var(--secondary);
      color: var(--accent);
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .autofill-box button:hover {
      background-color: var(--primary);
      transform: scale(1.02);
    }

    .select-group {
      display: flex;
      gap: 0.5rem;
      position: relative;
      z-index: 2;
    }

    .select-group select,
    .select-group button {
      flex: 1;
    }

    .path-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
      z-index: 2;
    }

    .path-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .path-item span {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-color);
      white-space: nowrap;
    }

    .path-item textarea {
      flex: 1;
    }

    .path-item button {
      width: auto;
      padding: 0.5rem 1rem;
    }

    #toast {
      display: none;
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--secondary);
      color: var(--accent);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 1000;
      box-shadow: var(--shadow);
      animation: fadeInOut 2s ease;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0; transform: translate(-50%, 10px); }
      10%, 90% { opacity: 1; transform: translate(-50%, 0); }
    }

    .signature {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      color: var(--primary);
      text-align: center;
      margin: 1rem 0;
      text-shadow: 0 0 5px var(--title-glow);
      cursor: pointer;
      grid-column: 1 / -1;
      position: relative;
      z-index: 2;
    }

    .signature span {
      display: inline-block;
      transition: transform 1s ease-out, opacity 1s ease;
    }

    .signature.shatter span {
      opacity: 0;
    }

    .signature.shatter span:nth-child(1) { transform: translate(-50px, -200px) rotate(-15deg); }
    .signature.shatter span:nth-child(2) { transform: translate(-40px, -210px) rotate(10deg); }
    .signature.shatter span:nth-child(3) { transform: translate(-30px, -190px) rotate(20deg); }
    .signature.shatter span:nth-child(4) { transform: translate(-20px, -220px) rotate(-10deg); }
    .signature.shatter span:nth-child(5) { transform: translate(-10px, -200px) rotate(15deg); }
    .signature.shatter span:nth-child(6) { transform: translate(0, -210px) rotate(-20deg); }
    .signature.shatter span:nth-child(7) { transform: translate(10px, -190px) rotate(10deg); }
    .signature.shatter span:nth-child(8) { transform: translate(20px, -220px) rotate(-15deg); }
    .signature.shatter span:nth-child(9) { transform: translate(30px, -200px) rotate(20deg); }
    .signature.shatter span:nth-child(10) { transform: translate(40px, -210px) rotate(-10deg); }
    .signature.shatter span:nth-child(11) { transform: translate(50px, -190px) rotate(15deg); }
    .signature.shatter span:nth-child(12) { transform: translate(60px, -220px) rotate(-20deg); }
    .signature.shatter span:nth-child(13) { transform: translate(70px, -200px) rotate(10deg); }

    @media (max-width: 600px) {
      body {
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .mode-toggle {
        top: 1rem;
        right: 1rem;
      }

      .mode-toggle label {
        width: 3.5rem;
        height: 1.8rem;
      }

      .mode-toggle .sun,
      .mode-toggle .moon {
        font-size: 1rem;
      }

      .mode-toggle .ball {
        width: 1.3rem;
        height: 1.3rem;
      }

      .mode-toggle input:checked + label .ball {
        transform: translateX(1.7rem);
      }

      .settings-toggle {
        top: 4rem;
        right: 1rem;
      }

      .settings-toggle button {
        width: 3.5rem;
        height: 1.8rem;
        font-size: 1rem;
      }

      .settings-panel {
        top: 6rem;
        right: 1rem;
        width: 200px;
      }

      .footer-links {
        left: 1rem;
        top: 3.5rem;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .footer-links a {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }

      .footer-links .ilogix-link .ship-logo {
        font-size: 0.9rem;
      }

      .autofill-box {
        padding: 1rem;
      }

      .validator-container .autofill-box {
        max-width: 600px;
        padding: 1.5rem;
      }

      .validator-container .autofill-box textarea {
        height: 160px;
      }

      .path-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .path-item span {
        margin-bottom: 0.25rem;
      }

      .path-item button {
        width: 100%;
      }

      .ship {
        font-size: 0.8rem;
      }

      .container {
        grid-template-columns: 1fr;
        margin-top: 6rem;
      }

      .signature {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

    // Create animated ships for background
    function createShips() {
      const ocean = document.getElementById("oceanBackground");
      const numShips = window.innerWidth < 600 ? 5 : 10;
      for (let i = 0; i < numShips; i++) {
        const ship = document.createElement("div");
        ship.className = "ship";
        ship.textContent = "🚢";
        ship.style.left = `${Math.random() * 100}vw`;
        ship.style.top = `${Math.random() * 100}vh`;
        const duration = 10 + Math.random() * 10;
        const delay = Math.random() * 5;
        ship.style.animation = `sail ${duration}s linear ${delay}s infinite`;
        ocean.appendChild(ship);
      }

      const styleSheet = document.createElement("style");
      styleSheet.textContent = `
        @keyframes sail {
          0% { transform: translateX(0) translateY(0) rotate(0deg); }
          25% { transform: translateX(${Math.random() * 50 - 25}vw) translateY(${Math.random() * 10 - 5}vh) rotate(${Math.random() * 10 - 5}deg); }
          50% { transform: translateX(${Math.random() * 50 - 25}vw) translateY(${Math.random() * 10 - 5}vh) rotate(${Math.random() * 10 - 5}deg); }
          75% { transform: translateX(${Math.random() * 50 - 25}vw) translateY(${Math.random() * 10 - 5}vh) rotate(${Math.random() * 10 - 5}deg); }
          100% { transform: translateX(0) translateY(0) rotate(0deg); }
        }
      `;
      document.head.appendChild(styleSheet);

      const ships = document.querySelectorAll(".ship");
      document.addEventListener("mousemove", (e) => {
        ships.forEach((ship) => {
          const rect = ship.getBoundingClientRect();
          const shipX = rect.left + rect.width / 2;
          const shipY = rect.top + rect.height / 2;
          const mouseX = e.clientX;
          const mouseY = e.clientY;
          const distance = Math.sqrt((mouseX - shipX) ** 2 + (mouseY - shipY) ** 2);
          if (distance < 100) {
            const angle = Math.atan2(mouseY - shipY, mouseX - shipX);
            const moveX = -Math.cos(angle) * 50;
            const moveY = -Math.sin(angle) * 50;
            ship.style.transform = `translate(${moveX}px, ${moveY}px)`;
            setTimeout(() => {
              ship.style.transform = "";
            }, 300);
          }
        });
      });
    }

      const signature = document.querySelector(".signature");

      signature.innerHTML = text.split("").map(char => `<span>${char === " " ? " " : char}</span>`).join("");
      let isAnimating = false;

      signature.addEventListener("mouseenter", () => {
        if (isAnimating) return;
        isAnimating = true;
        signature.classList.add("shatter");
        const spans = signature.querySelectorAll("span");
        spans.forEach((span, i) => {
          setTimeout(() => {
            span.textContent = "🚢";
            span.style.opacity = 0;
          }, i * 50);
        });
        setTimeout(() => {
          signature.classList.remove("shatter");
          signature.innerHTML = text.split("").map(char => `<span>${char === " " ? " " : char}</span>`).join("");
          isAnimating = false;
        }, 2000);
      });
    }

// TW autofixJSON
function processJSON(){

  const mode = document.getElementById("jsonMode").value;

  if(mode === "clean"){
    cleanHTS();
  }

  if(mode === "merge"){
    mergeLines();
  }

}


function cleanHTS(){

  let input = document.getElementById("jsonInput").value;

  try{

    const data = JSON.parse(input);

    if(data.products && Array.isArray(data.products)){

      data.products.forEach(product => {

        if(product.tariff_codes){

          let newCodes = [];

          product.tariff_codes.forEach(code => {

            const splitCodes = code.split(",");

            splitCodes.forEach(c => {

              const clean = c.trim();

              if(clean && !clean.startsWith("981")){
                newCodes.push(clean);
              }

            });

          });

          product.tariff_codes = newCodes;

        }

      });

    }

    document.getElementById("jsonOutput").value =
      JSON.stringify(data, null, 2);

  }catch(e){

    alert("Invalid JSON");

  }

}


function mergeLines(){

  let input = document.getElementById("jsonInput").value;

  try{

    const data = JSON.parse(input);

    if(!data.products || data.products.length === 0){
      alert("No products found");
      return;
    }

    const groups = {};

    data.products.forEach(p => {

      let codes = [];

      if(p.tariff_codes){

        p.tariff_codes.forEach(code => {

          const split = code.split(",");

          split.forEach(c => {

            const clean = c.trim();

            if(clean && !clean.startsWith("981")){
              codes.push(clean);
            }

          });

        });

      }

      // normalize order so ["A","B"] = ["B","A"]
      codes.sort();

      const key = codes.join("|");

      if(!groups[key]){
        groups[key] = [];
      }

      groups[key].push(p);

    });

    const mergedProducts = [];

    Object.keys(groups).forEach(key => {

      const items = groups[key];
      const htsCodes = key.split("|");

      let totalValue = 0;
      let totalQty = 0;
      let totalGross = 0;
      let hasGrossWeight = false;

      items.forEach(p => {

        totalValue += parseFloat(p.total_line_value || 0);
        totalQty += parseFloat(p.quantity || 0);

        if(p.gross_weight && p.gross_weight !== ""){
          totalGross += parseFloat(p.gross_weight);
          hasGrossWeight = true;
        }

      });

      mergedProducts.push({
        total_line_value: totalValue.toFixed(2),
        country_of_origin_code: items[0].country_of_origin_code,
        tariff_codes: htsCodes,
        quantity: totalQty.toString(),
        description: items[0].description,
        net_weight: "",
        gross_weight: hasGrossWeight ? totalGross.toFixed(2) : ""
      });

    });

    data.products = mergedProducts;

    document.getElementById("jsonOutput").value =
      JSON.stringify(data, null, 2);

  }catch(e){

    alert("Invalid JSON");

  }
function copyOutput() {

  const output = document.getElementById("jsonOutput");

  if (!output.value) {
    alert("Nothing to copy");
    return;
  }

  output.select();
  output.setSelectionRange(0, 999999); // for mobile compatibility

  document.execCommand("copy");

}
}
